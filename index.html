<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Weather Dashboard | Yatharth Pathak</title>

    <meta name="description"
        content="Real-time Weather Dashboard using OpenWeatherMap API">

    <link rel="stylesheet" href="assets/css/style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="container">

        <!-- HEADER -->

        <header>

            <h1>
                <i class="fas fa-cloud-sun"></i>
                Weather Dashboard
            </h1>

            <p>
                Real-Time Weather Information Worldwide
            </p>

        </header>

        <!-- SEARCH -->

        <section class="search-section">

            <input
                type="text"
                id="cityInput"
                placeholder="Enter city name...">

            <button id="searchBtn">
                <i class="fas fa-search"></i>
                Search
            </button>

            <button id="locationBtn">
                <i class="fas fa-location-dot"></i>
                My Location
            </button>

        </section>

        <!-- LOADING -->

        <div id="loading" class="hidden">

            <div class="spinner"></div>

            <p>Loading Weather Data...</p>

        </div>

        <!-- ERROR -->

        <div id="errorMessage"></div>

        <!-- WEATHER CARD -->

        <section
            id="weatherCard"
            class="weather-card hidden">

            <div class="top-section">

                <div>

                    <h2 id="cityName">London</h2>

                    <p id="countryName">GB</p>

                    <p id="currentDate"></p>

                </div>

                <img
                    id="weatherIcon"
                    src=""
                    alt="Weather Icon">

            </div>

            <div class="temperature-section">

                <h1 id="temperature">
                    25°C
                </h1>

                <p id="description">
                    Clear Sky
                </p>

            </div>

        </section>

        <!-- STATS -->

        <section
            id="weatherStats"
            class="stats-grid hidden">

            <div class="stat-card">

                <i class="fas fa-temperature-half"></i>

                <h3>Feels Like</h3>

                <p id="feelsLike">0°C</p>

            </div>

            <div class="stat-card">

                <i class="fas fa-droplet"></i>

                <h3>Humidity</h3>

                <p id="humidity">0%</p>

            </div>

            <div class="stat-card">

                <i class="fas fa-wind"></i>

                <h3>Wind Speed</h3>

                <p id="windSpeed">0 m/s</p>

            </div>

            <div class="stat-card">

                <i class="fas fa-gauge"></i>

                <h3>Pressure</h3>

                <p id="pressure">0 hPa</p>

            </div>

            <div class="stat-card">

                <i class="fas fa-eye"></i>

                <h3>Visibility</h3>

                <p id="visibility">0 km</p>

            </div>

            <div class="stat-card">

                <i class="fas fa-sun"></i>

                <h3>Sunrise</h3>

                <p id="sunrise">--</p>

            </div>

            <div class="stat-card">

                <i class="fas fa-moon"></i>

                <h3>Sunset</h3>

                <p id="sunset">--</p>

            </div>

            <div class="stat-card">

                <i class="fas fa-temperature-arrow-down"></i>

                <h3>Min / Max</h3>

                <p id="minmax">--</p>

            </div>

        </section>

        <!-- FORECAST -->

        <section
            id="forecastSection"
            class="forecast-section hidden">

            <h2>5-Day Forecast</h2>

            <div
                id="forecastContainer"
                class="forecast-container">

            </div>

        </section>

        <!-- SEARCH HISTORY -->

        <section
            id="historySection"
            class="history-section">

            <h2>Recent Searches</h2>

            <div
                id="historyContainer"
                class="history-container">

            </div>

        </section>

    </div>

    <script src="assets/js/script.js"></script>

</body>

</html>
